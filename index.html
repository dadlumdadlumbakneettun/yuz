<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Snap Efektleri</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--panel:rgba(10,10,22,0.92);--border:rgba(255,255,255,0.08);
  --txt:#f0f0f5;--muted:#6b6b8a;--accent:#00E5FF;
  --font:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font)}
#webcam{display:none!important}
#output_canvas{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;transform:scaleX(-1);z-index:0}

/* ── EFFECT PICKER BAR ── */
#effect_bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:16px 16px 28px;
  background:linear-gradient(to top,rgba(5,5,15,0.97) 0%,rgba(5,5,15,0.85) 70%,transparent 100%);
  display:flex;align-items:center;gap:10px;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#effect_bar::-webkit-scrollbar{display:none}

.eff-btn{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;user-select:none;
  transition:transform .18s ease;
}
.eff-btn:active{transform:scale(0.9)}
.eff-icon{
  width:64px;height:64px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  border:2px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(8px);
  transition:border-color .18s,background .18s,box-shadow .18s;
}
.eff-btn.active .eff-icon{
  border-color:var(--accent);
  background:rgba(0,229,255,0.15);
  box-shadow:0 0 20px rgba(0,229,255,0.35),inset 0 0 10px rgba(0,229,255,0.1);
}
.eff-lbl{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.02em;transition:color .18s}
.eff-btn.active .eff-lbl{color:var(--accent)}

/* ── TOP BAR ── */
#top_bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
}
#effect_name_badge{
  padding:7px 16px;border-radius:99px;font-size:13px;font-weight:600;
  background:rgba(10,10,22,0.85);border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(16px);color:var(--txt);
  transition:opacity .3s;letter-spacing:.02em;
  pointer-events:none;
}
</style>
</head>
<body>
<video id="webcam" autoplay playsinline muted></video>
<canvas id="output_canvas"></canvas>

<div id="top_bar">
  <div id="effect_name_badge">😴 Efekt Yok</div>
</div>

<div id="effect_bar">
  <div class="eff-btn active" data-effect="none">
    <div class="eff-icon">😴</div>
    <div class="eff-lbl">Yok</div>
  </div>
  <div class="eff-btn" data-effect="fat_face">
    <div class="eff-icon">🐡</div>
    <div class="eff-lbl">Şişman Yüz</div>
  </div>
  <div class="eff-btn" data-effect="big_eyes">
    <div class="eff-icon">👀</div>
    <div class="eff-lbl">Dev Gözler</div>
  </div>
  <div class="eff-btn" data-effect="tiny_face">
    <div class="eff-icon">🔬</div>
    <div class="eff-lbl">Küçük Yüz</div>
  </div>
  <div class="eff-btn" data-effect="big_nose">
    <div class="eff-icon">🤡</div>
    <div class="eff-lbl">Kocaman Burun</div>
  </div>
  <div class="eff-btn" data-effect="long_face">
    <div class="eff-icon">🦒</div>
    <div class="eff-lbl">Uzun Yüz</div>
  </div>
  <div class="eff-btn" data-effect="alien">
    <div class="eff-icon">👽</div>
    <div class="eff-lbl">Uzaylı</div>
  </div>
  <div class="eff-btn" data-effect="mirror_eyes">
    <div class="eff-icon">🔮</div>
    <div class="eff-lbl">Ayna Göz</div>
  </div>
  <div class="eff-btn" data-effect="potato">
    <div class="eff-icon">🥔</div>
    <div class="eff-lbl">Patates</div>
  </div>
  <div class="eff-btn" data-effect="shaky">
    <div class="eff-icon">🫨</div>
    <div class="eff-lbl">Titreme</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  CORE SETUP
// ══════════════════════════════════════════════════
const video   = document.getElementById('webcam');
const canvas  = document.getElementById('output_canvas');
const ctx     = canvas.getContext('2d', {willReadFrequently:true});

let faceLms = null;
let currentEffect = 'none';
let effectAlpha   = 0; // smooth transition 0→1
let time = 0;

const EFFECTS = {
  none:       { label:'😴 Efekt Yok' },
  fat_face:   { label:'🐡 Şişman Yüz' },
  big_eyes:   { label:'👀 Dev Gözler' },
  tiny_face:  { label:'🔬 Küçük Yüz' },
  big_nose:   { label:'🤡 Kocaman Burun' },
  long_face:  { label:'🦒 Uzun Yüz' },
  alien:      { label:'👽 Uzaylı' },
  mirror_eyes:{ label:'🔮 Ayna Göz' },
  potato:     { label:'🥔 Patates Yüz' },
  shaky:      { label:'🫨 Titreme' },
};

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

// Effect picker
document.querySelectorAll('.eff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.eff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentEffect = btn.dataset.effect;
    effectAlpha   = 0;
    document.getElementById('effect_name_badge').textContent = EFFECTS[currentEffect].label;
  });
});

// ══════════════════════════════════════════════════
//  LANDMARK HELPERS
// ══════════════════════════════════════════════════
function lmPx(lms, i, W, H){ return [lms[i].x*W, lms[i].y*H] }

// Face bounding box
function faceBBox(lms, W, H){
  let minX=W,minY=H,maxX=0,maxY=0;
  for(const p of lms){
    if(p.x*W<minX)minX=p.x*W; if(p.x*W>maxX)maxX=p.x*W;
    if(p.y*H<minY)minY=p.y*H; if(p.y*H>maxY)maxY=p.y*H;
  }
  return {x:minX,y:minY,w:maxX-minX,h:maxY-minY,cx:(minX+maxX)/2,cy:(minY+maxY)/2};
}

// ══════════════════════════════════════════════════
//  WARP ENGINE  (offscreen pixel displacement)
// ══════════════════════════════════════════════════
const offCanvas = document.createElement('canvas');
const offCtx    = offCanvas.getContext('2d',{willReadFrequently:true});

// Single radial push/pull warp
// cx,cy = center of warp, radius = effect radius
// strength > 0 = push out (fatten), < 0 = suck in (shrink)
function warpRegion(imageData, W, H, cx, cy, radius, strength){
  const src = imageData;
  const dst = new Uint8ClampedArray(src.data);
  const r2  = radius*radius;

  for(let y=Math.max(0,cy-radius|0); y<Math.min(H,cy+radius|0); y++){
    for(let x=Math.max(0,cx-radius|0); x<Math.min(W,cx+radius|0); x++){
      const dx=x-cx, dy=y-cy;
      const d2=dx*dx+dy*dy;
      if(d2>=r2)continue;
      const d=Math.sqrt(d2);
      const t=(1-d/radius);
      const push=t*t*strength;
      let sx=x-dx*push, sy=y-dy*push;
      sx=Math.max(0,Math.min(W-1,sx|0));
      sy=Math.max(0,Math.min(H-1,sy|0));
      const si=(sy*W+sx)*4, di=(y*W+x)*4;
      dst[di]=src.data[si]; dst[di+1]=src.data[si+1];
      dst[di+2]=src.data[si+2]; dst[di+3]=src.data[si+3];
    }
  }
  return new ImageData(dst,W,H);
}

// Scale a region (for tiny/big face)
function scaleRegion(imageData, W, H, cx, cy, radius, scale){
  const src=imageData;
  const dst=new Uint8ClampedArray(src.data);
  const r2=radius*radius;
  for(let y=Math.max(0,(cy-radius)|0);y<Math.min(H,(cy+radius)|0);y++){
    for(let x=Math.max(0,(cx-radius)|0);x<Math.min(W,(cx+radius)|0);x++){
      const dx=x-cx,dy=y-cy;
      const d2=dx*dx+dy*dy;
      if(d2>=r2)continue;
      const d=Math.sqrt(d2);
      const t=(1-d/radius);
      const s=1+(scale-1)*t*t;
      let sx=cx+(dx/s), sy=cy+(dy/s);
      sx=Math.max(0,Math.min(W-1,sx|0));
      sy=Math.max(0,Math.min(H-1,sy|0));
      const si=(sy*W+sx)*4, di=(y*W+x)*4;
      dst[di]=src.data[si]; dst[di+1]=src.data[si+1];
      dst[di+2]=src.data[si+2]; dst[di+3]=src.data[si+3];
    }
  }
  return new ImageData(dst,W,H);
}

// ══════════════════════════════════════════════════
//  EFFECT RENDERERS
// ══════════════════════════════════════════════════
function applyEffect(W, H, lms, effect, alpha, t){
  // Draw base video into offscreen
  offCanvas.width=W; offCanvas.height=H;
  offCtx.save();
  offCtx.scale(-1,1); offCtx.drawImage(video,-W,0,W,H);
  offCtx.restore();

  if(effect==='none' || !lms){
    ctx.save(); ctx.scale(-1,1); ctx.drawImage(offCanvas,-W,0,W,H); ctx.restore();
    return;
  }

  const bb  = faceBBox(lms,W,H);
  const fcx = bb.cx, fcy = bb.cy;
  const frad= bb.w*0.6; // face radius

  // Mirror: landmark x is flipped vs canvas (canvas is scaleX(-1) via CSS)
  // But we draw without CSS flip here, so landmarks need mirroring
  const mx = x => W - x; // mirror x for our offscreen draw

  // Key points (mirrored)
  const noseTip    = [mx(lms[1].x*W),   lms[1].y*H];
  const leftEye    = [mx((lms[33].x+lms[133].x)/2*W),  (lms[33].y+lms[133].y)/2*H];
  const rightEye   = [mx((lms[362].x+lms[263].x)/2*W), (lms[362].y+lms[263].y)/2*H];
  const eyeRadius  = Math.hypot(lms[133].x*W-lms[33].x*W, lms[133].y*H-lms[33].y*H)*1.6;
  const mouthCx    = mx((lms[61].x+lms[291].x)/2*W);
  const mouthCy    = (lms[61].y+lms[291].y)/2*H;
  const mfcx       = mx(fcx); // mirrored face center x

  let imgData = offCtx.getImageData(0,0,W,H);

  if(effect==='fat_face'){
    // Push face outward from center — big radial push
    const str = 0.55*alpha;
    imgData = warpRegion(imgData,W,H, mfcx, fcy, frad*1.4, str);
  }

  else if(effect==='big_eyes'){
    const str = 1.9*alpha;
    imgData = scaleRegion(imgData,W,H, leftEye[0], leftEye[1], eyeRadius*2.2, 1+str);
    imgData = scaleRegion(imgData,W,H, rightEye[0],rightEye[1],eyeRadius*2.2, 1+str);
  }

  else if(effect==='tiny_face'){
    // Shrink the inner face region
    const str = 0.42*alpha;
    imgData = scaleRegion(imgData,W,H, mfcx, fcy, frad*0.85, 1-str);
  }

  else if(effect==='big_nose'){
    const nrad  = frad*0.38;
    const str   = 2.2*alpha;
    imgData = scaleRegion(imgData,W,H, noseTip[0], noseTip[1], nrad, 1+str);
  }

  else if(effect==='long_face'){
    // Stretch face vertically — push top up and chin down
    const chin   = [mx(lms[152].x*W), lms[152].y*H];
    const forehead=[mx(lms[10].x*W),  lms[10].y*H];
    const dy     = frad*0.6*alpha;

    const dst2   = new Uint8ClampedArray(imgData.data);
    const topY   = forehead[1], botY = chin[1];
    const faceH  = botY - topY;

    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const dx2 = x - mfcx;
        const ddist2 = dx2*dx2;
        const xrad2  = (frad*1.1)*(frad*1.1);
        if(ddist2>xrad2){continue;}

        let sy=y;
        const relY=(y-topY)/faceH; // 0=top,1=bottom
        const blend=Math.max(0,Math.min(1, 1-Math.abs(2*relY-1)));

        if(y<topY){sy=y+dy*blend*0.5;}
        else if(y>botY){sy=y-dy*blend*0.5;}
        else{
          const stretch = (relY-0.5)*2; // -1..1
          sy = y - stretch*dy*blend;
        }

        sy=Math.max(0,Math.min(H-1,sy|0));
        const si=(sy*W+x)*4, di=(y*W+x)*4;
        dst2[di]=imgData.data[si]; dst2[di+1]=imgData.data[si+1];
        dst2[di+2]=imgData.data[si+2]; dst2[di+3]=imgData.data[si+3];
      }
    }
    imgData = new ImageData(dst2,W,H);
  }

  else if(effect==='alien'){
    // Huge forehead + tiny chin
    const forehead=[mx(lms[10].x*W),  lms[10].y*H];
    const chin    =[mx(lms[152].x*W), lms[152].y*H];
    imgData = scaleRegion(imgData,W,H, forehead[0],forehead[1], frad*1.1, 1+1.3*alpha);
    imgData = scaleRegion(imgData,W,H, chin[0],    chin[1],     frad*0.5, 1-0.35*alpha);
    // Also big eyes
    imgData = scaleRegion(imgData,W,H, leftEye[0], leftEye[1],  eyeRadius*2, 1+0.8*alpha);
    imgData = scaleRegion(imgData,W,H, rightEye[0],rightEye[1], eyeRadius*2, 1+0.8*alpha);
  }

  else if(effect==='mirror_eyes'){
    // Copy right eye region to left and vice versa
    const eRad = eyeRadius*1.4;
    const dst2  = new Uint8ClampedArray(imgData.data);

    // Sample right eye, paste to left (mirrored)
    for(let dy2=-eRad; dy2<eRad; dy2++){
      for(let dx2=-eRad; dx2<eRad; dx2++){
        if(dx2*dx2+dy2*dy2>eRad*eRad)continue;
        // Source: right eye
        const sx = Math.max(0,Math.min(W-1,(rightEye[0]+dx2)|0));
        const sy = Math.max(0,Math.min(H-1,(rightEye[1]+dy2)|0));
        // Dest: left eye (flipped x)
        const dx3 = Math.max(0,Math.min(W-1,(leftEye[0]-dx2)|0));
        const dy3 = Math.max(0,Math.min(H-1,(leftEye[1]+dy2)|0));
        const si=(sy*W+sx)*4, di=(dy3*W+dx3)*4;
        // blend with alpha
        dst2[di]  =dst2[di]  *(1-alpha)+imgData.data[si]  *alpha;
        dst2[di+1]=dst2[di+1]*(1-alpha)+imgData.data[si+1]*alpha;
        dst2[di+2]=dst2[di+2]*(1-alpha)+imgData.data[si+2]*alpha;
        dst2[di+3]=255;
      }
    }
    imgData = new ImageData(dst2,W,H);
  }

  else if(effect==='potato'){
    // Squash face horizontally + fatten
    const str  = 0.38*alpha;
    const dst2 = new Uint8ClampedArray(imgData.data);
    const topY = (lms[10].y*H)|0;
    const botY = (lms[152].y*H)|0;

    for(let y=topY; y<botY; y++){
      for(let x=0; x<W; x++){
        const relX = (x-mfcx)/frad;
        const relY = (y-fcy)/frad;
        // horizontal squash
        let sx = mfcx + (x-mfcx)*(1+str*0.6);
        // slight vertical squash
        let sy = fcy  + (y-fcy)  *(1-str*0.3);
        sx=Math.max(0,Math.min(W-1,sx|0));
        sy=Math.max(0,Math.min(H-1,sy|0));
        const si=(sy*W+sx)*4, di=(y*W+x)*4;
        dst2[di]=imgData.data[si]; dst2[di+1]=imgData.data[si+1];
        dst2[di+2]=imgData.data[si+2]; dst2[di+3]=imgData.data[si+3];
      }
    }
    // Also fatten
    imgData = new ImageData(dst2,W,H);
    imgData = warpRegion(imgData,W,H, mfcx, fcy, frad*1.2, 0.35*alpha);
  }

  else if(effect==='shaky'){
    // Jitter/wave distortion
    const dst2 = new Uint8ClampedArray(imgData.data.length);
    const amp  = 8*alpha;
    const freq = 0.04;
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const dx2 = x-mfcx, dy2=y-fcy;
        const dist=Math.sqrt(dx2*dx2+dy2*dy2);
        const inFace = dist < frad*1.2;
        let sx=x, sy=y;
        if(inFace){
          const blend=Math.max(0,1-dist/(frad*1.2));
          sx = x + Math.sin(y*freq + t*8)*amp*blend;
          sy = y + Math.cos(x*freq + t*6)*amp*blend;
        }
        sx=Math.max(0,Math.min(W-1,sx|0));
        sy=Math.max(0,Math.min(H-1,sy|0));
        const si=(sy*W+sx)*4, di=(y*W+x)*4;
        dst2[di]=imgData.data[si]; dst2[di+1]=imgData.data[si+1];
        dst2[di+2]=imgData.data[si+2]; dst2[di+3]=imgData.data[si+3];
      }
    }
    imgData = new ImageData(dst2,W,H);
  }

  offCtx.putImageData(imgData,0,0);

  // Draw offscreen (already un-mirrored) → canvas (which CSS mirrors back)
  ctx.save();
  ctx.scale(-1,1);
  ctx.drawImage(offCanvas,-W,0,W,H);
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════
function loop(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  time += 0.016;

  // Smooth transition
  const targetAlpha = (currentEffect!=='none') ? 1 : 0;
  effectAlpha += (targetAlpha - effectAlpha) * 0.12;

  if(video.readyState >= 2){
    applyEffect(W, H, faceLms, currentEffect, Math.min(1,effectAlpha), time);
  }

  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════
//  MEDIAPIPE
// ══════════════════════════════════════════════════
const holistic = new Holistic({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`});
holistic.setOptions({modelComplexity:1,smoothLandmarks:true,refineFaceLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
holistic.onResults(r=>{ faceLms = r.faceLandmarks||null; });

const camera = new Camera(video,{
  onFrame: async()=>await holistic.send({image:video}),
  width:1280, height:720
});
camera.start();
requestAnimationFrame(loop);
</script>
</body>
</html>
